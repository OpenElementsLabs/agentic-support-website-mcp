spring:
  application:
    name: content-mcp
  datasource:
    # spring-services requires a datasource for its JPA-backed api-key/user stack, which the MCP
    # server depends on. The content MCP keeps no relational state of its own; this in-memory H2
    # instance backs only the library's tables. Override with a persistent DB for production if the
    # library's api-key/user data must survive restarts.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:content-mcp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS OE_SPRING_SERVICES}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        # spring-services' entities live in the OE_SPRING_SERVICES schema; without this Hibernate
        # tries to CREATE TABLE in a schema it never created (fails on a fresh H2). This makes it
        # create entity-declared schemas first.
        hbm2ddl:
          create_namespaces: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # The library's SecurityConfig wires an OAuth2 resource server on the default (non-MCP)
          # filter chain, so a JwtDecoder must exist. A jwk-set-uri yields a lazily-initialized
          # decoder (no network call at startup). The content MCP is reached via /mcp (api-key auth,
          # spec 013), so this JWT path is dormant; point it at the real IdP in production.
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://localhost:9999/.well-known/jwks.json}

openelements:
  mcp:
    enabled: true
    server-name: "Open Elements Content MCP"
    server-version: "0.1.0"
    auth:
      api-key:
        # Secure default: /mcp requires X-API-Key. Disable for local development via the `dev`
        # profile (application-dev.yaml) or MCP_API_KEY_AUTH_ENABLED=false.
        enabled: ${MCP_API_KEY_AUTH_ENABLED:true}
  meilisearch:
    enabled: true
    host: ${MEILISEARCH_HOST:http://localhost:7700}
    master-key: ${MEILISEARCH_MASTER_KEY:}
    index-prefix: ${MEILISEARCH_INDEX_PREFIX:content_}

open-elements:
  content:
    enabled: true
    refresh-cron: "0 0 * * * *"
    user-agent: "OpenElementsContentBot/1.0 (+https://open-elements.com)"
    rate-limit-per-host: 2
    request-timeout: 10s
    max-body-bytes: 5MB
    sources:
      - id: open-elements
        type: website
        base-url: https://open-elements.com
        sitemaps: [ /en/sitemap.xml, /de/sitemap.xml ]
        url-include: [ "/posts/**", "/de/posts/**" ]
        content-selector: "article"
        enabled: true
      # hiero.org has a real /sitemap.xml (flat urlset) listing every /blog/<post>; robots.txt is a
      # Next.js HTML catch-all (no rules -> allow-all). Posts are wrapped in <main><article>.
      - id: hiero
        type: website
        base-url: https://hiero.org
        sitemaps: [ /sitemap.xml ]
        url-include: [ "/blog/**" ]
        content-selector: "main article"
        enabled: true
      # Support & Care is two pages under /en/ (support-care, support-care-maven), listed in
      # /en/sitemap.xml. They lack a clean article container, so take the <body> minus boilerplate.
      - id: support-and-care
        type: website
        base-url: https://open-elements.com
        sitemaps: [ /en/sitemap.xml ]
        url-include: [ "/en/support-care*", "/en/support-care/**" ]
        content-selector: "body"
        content-exclude: [ "nav", "header", "footer", ".cookie-banner", "aside" ]
        enabled: true
